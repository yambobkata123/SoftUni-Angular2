<div class="form-container">
  <h1>{{ isEditMode ? 'Edit Workout' : 'Create New Workout' }}</h1>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Workout Name *</label>
      <input id="name" formControlName="name" type="text" />
      <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="error">
        Workout name is required (min 3 chars)
      </div>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="4"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="duration">Duration (minutes) *</label>
        <input id="duration" type="number" formControlName="duration" min="5" max="240" />
        <div *ngIf="form.get('duration')?.invalid && form.get('duration')?.touched" class="error">
          Duration between 5-240 minutes
        </div>
      </div>
      <div class="form-group">
        <label for="difficulty">Difficulty Level *</label>
        <select id="difficulty" formControlName="difficulty">
          <option value="">Select difficulty</option>
          <option value="easy">Easy 🟢</option>
          <option value="medium">Medium 🟡</option>
          <option value="hard">Hard 🔴</option>
        </select>
        <div *ngIf="form.get('difficulty')?.invalid && form.get('difficulty')?.touched" class="error">
          Please select difficulty level
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" [disabled]="form.invalid || loading" class="btn btn-primary">
        {{ loading ? 'Saving...' : (isEditMode ? 'Update Workout' : 'Create Workout') }}
      </button>
      <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
    </div>
    <div *ngIf="error" class="error alert">{{ error }}</div>
  </form>
</div>

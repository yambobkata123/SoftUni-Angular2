<div class="home">
  <h1>Fitness Tracker</h1>
  <p>Welcome to your fitness journey! Browse workouts or login to create your own.</p>
  <div class="featured" *ngIf="latestWorkouts$ | async as workouts; else loading">
    <h2>Featured Workouts</h2>
    <div class="workout-grid">
      <div class="workout-card" *ngFor="let workout of workouts.slice(0,3)">
        <h3>{{workout.name}}</h3>
        <p>{{workout.description}}</p>
        <p>Duration: {{workout.duration}} min | {{workout.difficulty | difficulty}}</p>
        <a routerLink="/workout/{{workout.id}}">View Details</a>
      </div>
    </div>
  </div>
  <ng-template #loading>
    <p>Loading...</p>
  </ng-template>
</div>
